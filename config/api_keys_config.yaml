# API-key environment-variable mapping (optional).
#
# Maps each LLM provider to the NAME of the environment variable that holds
# its API key. Change a value (for example to OPENAI_API_KEY_2) to swap which
# key a provider uses without touching your shell environment. This file is
# optional: a missing file, or any omitted provider, falls back to the default
# environment-variable name shown below. Values are env var names, not keys, so
# no secrets are stored here.
openai: OPENAI_API_KEY
anthropic: ANTHROPIC_API_KEY
google: GOOGLE_API_KEY
openrouter: OPENROUTER_API_KEY
