# =============================================================================
# Paths Configuration
# =============================================================================
# General settings, file paths, and schema-specific configurations.
#
# Used by:
#   - main/mode_detector.py (interactive_mode)
#   - modules/extract/file_processor.py (output paths, temp file retention)
#   - modules/ui/core.py (schema path resolution)
#   - modules/infra/logger.py (logs_dir)
# =============================================================================

general:
  # -------------------------------------------------------------------------
  # Script Execution Mode
  # -------------------------------------------------------------------------
  # When true: scripts run interactively with user prompts and navigation.
  # When false: scripts run as CLI tools accepting command-line arguments.
  interactive_mode: true

  # -------------------------------------------------------------------------
  # Temporary File Retention
  # -------------------------------------------------------------------------
  # Retain .jsonl tracking files after processing (useful for debugging).
  # Note: Batch processing always retains JSONL for result retrieval.
  retain_temporary_jsonl: true

  # -------------------------------------------------------------------------
  # Output Path Behavior
  # -------------------------------------------------------------------------
  # When true: output files are written next to input files.
  # When false: output goes to the configured schema-specific directories below.
  input_paths_is_output_path: true

  # -------------------------------------------------------------------------
  # Logging
  # -------------------------------------------------------------------------
  # Path to log file or directory. Can be absolute or relative to project root.
  # If path ends with .log, it's treated as the log file path.
  # Otherwise, it's treated as a directory and application.log is created inside.
  logs_dir: ''

  # -------------------------------------------------------------------------
  # State Directory
  # -------------------------------------------------------------------------
  # Where cross-process state (the daily token-budget counter and the wizard's
  # last-run memory) is stored. Leave empty to use the user-level default
  # ~/.chronominer/ (recommended: shared across runs regardless of the working
  # directory). Set an absolute path to override. A legacy
  # .chronominer_token_state.json in the working directory is adopted once if
  # the user-level file is absent.
  state_dir: ''

# =============================================================================
# Schema Paths
# =============================================================================
# Per-schema input/output directories and export format toggles.
#
# Used by:
#   - modules/ui/core.py (path resolution)
#   - modules/extract/file_processor.py (output generation)
#   - main/check_batches.py (batch result processing)
#   - main/repair_extractions.py (extraction repair)
# =============================================================================

