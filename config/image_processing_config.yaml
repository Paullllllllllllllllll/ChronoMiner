# =============================================================================
# Image Processing Configuration for LLM Vision
# =============================================================================
# Controls image preprocessing for different LLM providers when sending
# images to vision-capable models for structured data extraction.
#
# Used by:
#   - modules/processing/image_utils.py (image preprocessing)
#   - modules/processing/pdf_utils.py (PDF page rendering DPI)
# =============================================================================

# PDF rendering resolution
target_dpi: 300

# Maximum pixel count per rendered page before automatic DPI reduction.
# When a page would exceed this budget at target_dpi, DPI is scaled down just
# enough to stay within the limit. Set to 0 to disable.
# Default 150_000_000 stays safely below PIL's decompression-bomb threshold (179 MP).
max_pixels_per_page: 150000000

# =============================================================================
# 1. OpenAI API Image Processing
# =============================================================================
api_image_processing:
  grayscale_conversion: true
  handle_transparency: true
  jpeg_quality: 95
  resize_profile: original
  llm_detail: high
  low_max_side_px: 512
  high_target_box: [768, 1536]
  original_max_side_px: 6000
  original_max_pixels: 10240000

# =============================================================================
# 2. Anthropic Claude API Image Processing
# =============================================================================
anthropic_image_processing:
  grayscale_conversion: true
  handle_transparency: true
  jpeg_quality: 95
  resize_profile: auto
  high_max_side_px: 1568
  low_max_side_px: 512

# =============================================================================
# 3. Google Gemini API Image Processing
# =============================================================================
google_image_processing:
  grayscale_conversion: true
  handle_transparency: true
  jpeg_quality: 95
  resize_profile: auto
  media_resolution: high
  high_target_box: [768, 1536]
  low_max_side_px: 512

# =============================================================================
# 4. Custom Endpoint Image Processing
# =============================================================================
# Aggressive preprocessing for self-hosted models with small context windows
# (e.g., 8,192 tokens). Produces compact images to stay within token budget.
# Adjust these values based on your endpoint's context window size.
custom_image_processing:
  target_dpi: 150
  grayscale_conversion: true
  handle_transparency: true
  jpeg_quality: 85
  resize_profile: low
  low_max_side_px: 768
  high_target_box: [512, 1024]
