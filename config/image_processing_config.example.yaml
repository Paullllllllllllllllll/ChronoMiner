# =============================================================================
# Image Processing Configuration for LLM Vision
# =============================================================================
# Controls image preprocessing for different LLM providers when sending
# images to vision-capable models for structured data extraction.
#
# Used by:
#   - modules/images/llm_preprocess.py (image preprocessing)
#   - modules/images/pdf_utils.py (PDF page rendering DPI)
# =============================================================================

# PDF rendering resolution
target_dpi: 300

# Render strategy for PDF pages:
#   direct      - rasterize each page straight at the size the active resize
#                 profile targets (never above target_dpi), skipping the wasted
#                 work of rendering high then downscaling. Providers downscale
#                 server-side above their caps anyway, so pixels beyond the cap
#                 are discarded. Payload is byte-identical to supersample
#                 whenever the target_dpi render already fits the profile caps.
#   supersample - always render at target_dpi, then LANCZOS-downscale in the
#                 resize step (legacy behavior).
render_strategy: direct

# Maximum pixel count per rendered page before automatic DPI reduction.
# When a page would exceed this budget at target_dpi, DPI is scaled down just
# enough to stay within the limit. Set to 0 to disable.
# 24 MP bounds a worst-case raw page to ~72 MB RAM while staying 2.3x above
# the 10.24 MP OpenAI 'original' send cap (headroom for supersampled
# LANCZOS downscaling on oversized pages such as fold-outs).
max_pixels_per_page: 24000000

# =============================================================================
# 1. OpenAI API Image Processing
# =============================================================================
api_image_processing:
  grayscale_conversion: false
  handle_transparency: true
  jpeg_quality: 95
  resize_profile: original
  # Recommended: original (full-resolution input) for best results.
  llm_detail: original
  low_max_side_px: 512
  high_target_box: [768, 1536]
  original_max_side_px: 6000
  original_max_pixels: 10240000

# =============================================================================
# 2. Anthropic Claude API Image Processing
# =============================================================================
anthropic_image_processing:
  grayscale_conversion: true
  handle_transparency: true
  jpeg_quality: 95
  resize_profile: auto
  # High-res tier models only (Claude Opus 4.7+/Sonnet 5): ~3x image-token
  # cost vs 1568. Older Claude models are server-side downscaled to 1568
  # anyway, so raising this above 1568 only pays off on the newer models.
  high_max_side_px: 2576
  low_max_side_px: 512

# =============================================================================
# 3. Google Gemini API Image Processing
# =============================================================================
google_image_processing:
  grayscale_conversion: true
  handle_transparency: true
  jpeg_quality: 95
  resize_profile: auto
  media_resolution: high
  high_target_box: [768, 1536]
  low_max_side_px: 512

# =============================================================================
# 4. Custom Endpoint Image Processing
# =============================================================================
# Aggressive preprocessing for self-hosted models with small context windows
# (e.g., 8,192 tokens). Produces compact images to stay within token budget.
# Adjust these values based on your endpoint's context window size.
custom_image_processing:
  target_dpi: 150
  grayscale_conversion: true
  handle_transparency: true
  jpeg_quality: 85
  resize_profile: low
  low_max_side_px: 768
  high_target_box: [512, 1024]
